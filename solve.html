<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cube Solver</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:#12141c;color:#fff;min-height:100vh;}
button{cursor:pointer;font-family:'Inter',sans-serif;}
textarea{font-family:'Roboto Mono',monospace;}
:root{--B:rgba(255,255,255,0.07);--CB:rgba(255,255,255,0.04);--TD:rgba(255,255,255,0.35);--TM:rgba(255,255,255,0.55);}

header{display:flex;align-items:center;padding:14px 16px 8px;gap:8px;opacity:0.85;}
header span{font-weight:700;font-size:16px;}

.cube-panel{background:#181b25;border-radius:12px;margin:0 12px 12px;padding:16px;border:1px solid var(--B);}
.view-btns{display:flex;justify-content:center;gap:6px;margin-bottom:14px;}
.view-btn{padding:5px 16px;border-radius:6px;border:none;font-size:12px;font-weight:600;font-family:'Inter',sans-serif;background:rgba(255,255,255,0.05);color:var(--TD);}
.view-btn.active{background:#246bfd;color:#fff;box-shadow:0 0 12px rgba(36,107,253,0.35);}

.scramble-panel{background:#181b25;border-radius:12px;margin:0 12px 12px;padding:14px;border:1px solid var(--B);}
.scramble-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.scramble-label{font-size:11px;font-weight:600;color:var(--TD);text-transform:uppercase;letter-spacing:1.5px;}
.input-toggle{display:flex;background:var(--CB);border-radius:6px;overflow:hidden;}
.input-toggle button{padding:4px 14px;border:none;font-size:11px;font-weight:600;font-family:'Inter',sans-serif;background:transparent;color:var(--TD);}
.input-toggle button.active{background:rgba(36,107,253,0.15);color:#246bfd;}

.custom-input textarea{width:100%;min-height:64px;padding:10px 12px;background:#0c0d17;border:1px solid var(--B);border-radius:8px;color:#fff;font-size:14px;font-family:'Roboto Mono',monospace;resize:vertical;outline:none;line-height:1.6;}
.custom-input textarea:focus{border-color:#246bfd;}
.custom-input textarea.error{border-color:#ef4444;}
.custom-input textarea.error:focus{border-color:#ef4444;}
.error-msg{font-size:12px;color:#ef4444;margin-top:6px;font-weight:500;display:flex;align-items:center;gap:4px;}
.hint-text{font-size:10px;color:var(--TD);margin-top:6px;}
.apply-btn{width:100%;margin-top:10px;padding:10px;border:none;border-radius:8px;background:#246bfd;color:#fff;font-size:13px;font-weight:600;font-family:'Inter',sans-serif;box-shadow:0 0 15px rgba(36,107,253,0.35);display:flex;align-items:center;justify-content:center;gap:6px;}

.move-chips{display:flex;flex-wrap:wrap;gap:3px;}
.move-chip{display:inline-flex;flex-direction:column;align-items:center;gap:2px;padding:4px 6px;border-radius:6px;min-width:32px;transition:all 0.12s;background:rgba(255,255,255,0.04);border:1px solid transparent;}
.move-chip.highlight{background:#246bfd30;border-color:#246bfd;}
.move-chip.done{background:rgba(34,197,94,0.08);}
.move-chip .label{font-family:'Roboto Mono',monospace;font-size:13px;font-weight:700;color:rgba(255,255,255,0.55);}
.move-chip.highlight .label{color:#246bfd;}
.move-chip.done .label{color:#22c55e;}
.move-chip .arrow{display:flex;align-items:center;opacity:0.8;}

.action-btns{display:flex;gap:8px;margin:0 12px 14px;}
.random-btn{flex:1;padding:12px;border:none;border-radius:10px;background:#1e242c;color:var(--TM);font-size:14px;font-weight:600;font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;gap:6px;}
.solve-btn{flex:1.6;padding:12px;border:none;border-radius:10px;background:#246bfd;color:#fff;font-size:14px;font-weight:600;font-family:'Inter',sans-serif;box-shadow:0 0 15px rgba(36,107,253,0.35);display:flex;align-items:center;justify-content:center;gap:6px;}
.solve-btn.solving{background:#333;box-shadow:none;cursor:default;}

.results{margin:0 12px 20px;}
.method-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.method-card{padding:12px;border-radius:12px;text-align:left;font-family:'Inter',sans-serif;border:2px solid transparent;background:#181b25;color:#fff;}
.method-card.active{box-shadow:0 0 15px rgba(0,0,0,0.2);}
.method-card .method-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.method-card .method-name{font-weight:700;font-size:14px;}
.method-card .badges{display:flex;align-items:center;gap:4px;}
.method-card .best-badge{font-size:9px;font-weight:700;padding:2px 8px;border-radius:4px;background:rgba(34,197,94,0.15);color:#22c55e;display:flex;align-items:center;gap:3px;}
.method-card .stats{display:flex;gap:14px;}
.method-card .stat-val{font-family:'Roboto Mono',monospace;font-size:20px;font-weight:700;}
.method-card .stat-label{font-size:10px;color:var(--TD);}
.stat-label-time{display:flex;align-items:center;gap:3px;}

.tabs{display:flex;gap:2px;margin-bottom:12px;background:var(--CB);border-radius:8px;padding:3px;}
.tab{flex:1;padding:7px 0;border:none;border-radius:6px;font-size:12px;font-weight:600;font-family:'Inter',sans-serif;background:transparent;color:var(--TD);display:flex;align-items:center;justify-content:center;gap:4px;}
.tab.active{background:rgba(36,107,253,0.15);color:#246bfd;}

.solution-panel,.compare-panel,.history-panel{background:#181b25;border-radius:12px;padding:14px;border:1px solid var(--B);}
.solution-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.solution-method{display:flex;align-items:center;gap:8px;}
.solution-method .name{font-weight:700;font-size:15px;}
.verified-badge{font-size:10px;font-weight:600;color:#22c55e;display:flex;align-items:center;gap:3px;}
.play-btn{padding:5px 16px;border-radius:6px;font-size:12px;font-weight:600;font-family:'Inter',sans-serif;display:flex;align-items:center;gap:4px;}

.step-card{margin-bottom:8px;border-radius:12px;overflow:hidden;border:1px solid transparent;background:var(--CB);}
.step-card.active-step{border-color:rgba(36,107,253,0.2);background:rgba(36,107,253,0.05);}
.step-card.expanded{border-color:rgba(255,255,255,0.1);}
.step-header{width:100%;padding:12px 14px;border:none;background:transparent;display:flex;justify-content:space-between;align-items:center;font-family:'Inter',sans-serif;color:#fff;}
.step-header .left{display:flex;align-items:center;gap:10px;}
.step-num{width:24px;height:24px;border-radius:7px;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:rgba(255,255,255,0.06);color:var(--TD);}
.step-num.done-num{background:rgba(34,197,94,0.12);color:#22c55e;}
.step-num.active-num{color:#246bfd;}
.step-name{font-weight:600;font-size:14px;color:#fff;text-align:left;}
.step-header .right{display:flex;align-items:center;gap:8px;}
.step-count{font-size:11px;font-family:'Roboto Mono',monospace;color:var(--TD);font-weight:500;}
.step-chevron{transition:transform 0.2s;}

.step-body{padding:0 14px 14px;}
.step-desc{font-size:12px;color:var(--TM);line-height:1.6;margin-bottom:10px;}
.step-why{background:rgba(36,107,253,0.06);border:1px solid rgba(36,107,253,0.12);border-radius:8px;padding:8px 12px;margin-bottom:14px;display:flex;gap:8px;align-items:flex-start;}
.step-why .icon{color:#246bfd;flex-shrink:0;margin-top:1px;}
.step-why .text{font-size:11px;color:rgba(255,255,255,0.5);line-height:1.6;}

.before-after{display:flex;gap:12px;justify-content:center;margin-bottom:14px;align-items:center;}
.ba-label{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}

.step-moves{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;}
.step-solved-msg{font-size:12px;color:#22c55e;text-align:center;padding:8px;display:flex;align-items:center;justify-content:center;gap:4px;}
.face-legend{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:10px;}
.face-legend-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--TM);}
.face-dot{width:8px;height:8px;border-radius:2px;box-shadow:inset 0 0 1px rgba(0,0,0,0.2);}

/* Compare */
.compare-title{font-weight:700;font-size:14px;color:var(--TM);display:block;margin-bottom:14px;}
.efficiency-row{margin-bottom:12px;}
.efficiency-header{display:flex;justify-content:space-between;margin-bottom:5px;align-items:center;}
.efficiency-method{font-size:12px;font-weight:600;display:flex;align-items:center;gap:4px;}
.efficiency-moves{font-size:12px;font-family:'Roboto Mono',monospace;color:var(--TM);}
.efficiency-bar{height:7px;background:var(--CB);border-radius:4px;overflow:hidden;}
.efficiency-fill{height:100%;border-radius:4px;transition:width 0.5s;}
.breakdown{margin-top:18px;padding-top:14px;border-top:1px solid var(--B);}
.breakdown-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.breakdown-card{background:var(--CB);border-radius:8px;padding:10px;}
.breakdown-method{font-size:12px;font-weight:700;margin-bottom:8px;}
.breakdown-row{display:flex;justify-content:space-between;margin-bottom:3px;}
.breakdown-name{font-size:10px;color:var(--TM);}
.breakdown-val{font-size:10px;font-family:'Roboto Mono',monospace;color:rgba(255,255,255,0.4);font-weight:600;}
.analysis-box{margin-top:14px;padding:12px;border-radius:10px;background:rgba(34,197,94,0.05);border:1px solid rgba(34,197,94,0.12);}
.analysis-title{font-size:13px;font-weight:600;color:#22c55e;margin-bottom:4px;display:flex;align-items:center;gap:4px;}
.analysis-text{font-size:12px;color:var(--TM);line-height:1.6;}

/* History */
.history-title{font-weight:700;font-size:14px;color:var(--TM);display:block;margin-bottom:12px;}
.history-empty{text-align:center;padding:24px;color:var(--TD);font-size:13px;}
.history-row{display:flex;justify-content:space-between;align-items:center;padding:10px;}
.history-row+.history-row{border-top:1px solid var(--B);}
.history-left{display:flex;align-items:center;gap:10px;}
.history-num{font-family:'Roboto Mono',monospace;font-size:11px;color:var(--TD);font-weight:600;width:20px;}
.history-winner{font-size:13px;font-weight:600;color:#246bfd;}
.history-moves{font-family:'Roboto Mono',monospace;font-size:12px;color:var(--TM);}

/* Mini cube */
.mini-cube{display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(3,1fr);gap:2px;flex-shrink:0;}
.mini-face{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);gap:1px;}
.mini-cell{border-radius:2px;width:11px;height:11px;box-shadow:inset 0 0 1px rgba(0,0,0,0.25);}

/* Cube net */
.cube-net{display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(3,1fr);gap:6px;width:100%;max-width:230px;margin:0 auto;}
.net-face{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);gap:3px;}
.net-cell{border-radius:3px;aspect-ratio:1;box-shadow:inset 0 0 1px rgba(0,0,0,0.2);}

.hidden{display:none;}
</style>
</head>
<body>
<div id="app"></div>

<script>
// ─── SVG ICONS ───────────────────────────────────────────────
const Icons={
dice:`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="8" cy="8" r="1" fill="currentColor"/><circle cx="16" cy="8" r="1" fill="currentColor"/><circle cx="8" cy="16" r="1" fill="currentColor"/><circle cx="16" cy="16" r="1" fill="currentColor"/><circle cx="12" cy="12" r="1" fill="currentColor"/></svg>`,
brain:`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2C8.69 2 6 4.69 6 8c0 1.2.36 2.32.97 3.26A4 4 0 0 0 4 15a4 4 0 0 0 4 4h8a4 4 0 0 0 4-4 4 4 0 0 0-2.97-3.74c.61-.94.97-2.06.97-3.26 0-3.31-2.69-6-6-6z"/><line x1="12" y1="22" x2="12" y2="19"/></svg>`,
play:`<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>`,
stop:`<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>`,
check:`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`,
warn:`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`,
trophy:`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>`,
clip:`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="2" width="8" height="4" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/></svg>`,
search:`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>`,
clock:`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`,
layers:`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>`,
bar:`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>`,
solved:`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>`,
};

function svgArrow(type,s=16){
const sw="2.5";
const arrows={
arrowL:`<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="${sw}" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>`,
arrowR:`<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="${sw}" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>`,
arrowU:`<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="${sw}" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>`,
arrowD:`<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="${sw}" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>`,
cwRot:`<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="${sw}" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><polyline points="21 3 21 8 16 8"/></svg>`,
ccwRot:`<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="${sw}" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><polyline points="3 3 3 8 8 8"/></svg>`,
chevDown:`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>`,
};
return arrows[type]||"";
}

function getMoveArrowType(move){
const b=move[0],mod=move.length>1?move.slice(1):"";
const ip=mod==="'",id=mod==="2";
let A=null;
if(b==="U")A=ip?"arrowR":"arrowL";
if(b==="D")A=ip?"arrowL":"arrowR";
if(b==="R")A=ip?"arrowD":"arrowU";
if(b==="L")A=ip?"arrowU":"arrowD";
if(b==="F")A=ip?"ccwRot":"cwRot";
if(b==="B")A=ip?"cwRot":"ccwRot";
if(id){
if(b==="U")A="arrowL";if(b==="D")A="arrowR";
if(b==="R")A="arrowU";if(b==="L")A="arrowD";
if(b==="F")A="cwRot";if(b==="B")A="ccwRot";
}
return{arrowType:A,isDouble:id};
}

const FL={U:"Top",D:"Bottom",F:"Front",B:"Back",L:"Left",R:"Right"};
const FC={U:"#ffffff",D:"#ffff49",F:"#43ff43",B:"#246bfd",L:"#ff9826",R:"#ff4343"};

// ─── CUBE ENGINE ─────────────────────────────────────────────
const SOLVED=[];for(let f=0;f<6;f++)for(let i=0;i<9;i++)SOLVED.push(f);
const SC=["#ffffff","#ffff49","#43ff43","#246bfd","#ff9826","#ff4343"];
const FN=["U","D","F","B","L","R"];

function rotCW(st,f){const s=[...st],i=f*9,t=[s[i],s[i+1],s[i+2],s[i+3],s[i+4],s[i+5],s[i+6],s[i+7],s[i+8]];s[i]=t[6];s[i+1]=t[3];s[i+2]=t[0];s[i+3]=t[7];s[i+4]=t[4];s[i+5]=t[1];s[i+6]=t[8];s[i+7]=t[5];s[i+8]=t[2];return s;}
const ADJ={0:[[2,0,2,1,2,2],[5,0,5,1,5,2],[3,8,3,7,3,6],[4,2,4,1,4,0]],1:[[2,6,2,7,2,8],[4,6,4,7,4,8],[3,2,3,1,3,0],[5,6,5,7,5,8]],2:[[0,6,0,7,0,8],[5,0,5,3,5,6],[1,2,1,1,1,0],[4,8,4,5,4,2]],3:[[0,2,0,1,0,0],[4,0,4,3,4,6],[1,6,1,7,1,8],[5,8,5,5,5,2]],4:[[0,0,0,3,0,6],[2,0,2,3,2,6],[1,0,1,3,1,6],[3,8,3,5,3,2]],5:[[0,8,0,5,0,2],[3,0,3,3,3,6],[1,8,1,5,1,2],[2,8,2,5,2,2]]};
function mvCW(st,f){let s=rotCW(st,f);const a=ADJ[f],t=[s[a[0][0]*9+a[0][1]],s[a[0][2]*9+a[0][3]],s[a[0][4]*9+a[0][5]]];for(let i=0;i<3;i++){s[a[i][0]*9+a[i][1]]=s[a[i+1][0]*9+a[i+1][1]];s[a[i][2]*9+a[i][3]]=s[a[i+1][2]*9+a[i+1][3]];s[a[i][4]*9+a[i][5]]=s[a[i+1][4]*9+a[i+1][5]];}s[a[3][0]*9+a[3][1]]=t[0];s[a[3][2]*9+a[3][3]]=t[1];s[a[3][4]*9+a[3][5]]=t[2];return s;}
function doM(st,m){const b=m.replace("'","").replace("2",""),fi=FN.indexOf(b);if(fi===-1)return st;if(m.includes("'"))return mvCW(mvCW(mvCW(st,fi),fi),fi);if(m.includes("2"))return mvCW(mvCW(st,fi),fi);return mvCW(st,fi);}
function doSeq(st,ms){return ms.reduce((s,m)=>doM(s,m),st);}
function isSolved(st){for(let f=0;f<6;f++)for(let i=0;i<9;i++)if(st[f*9+i]!==f)return false;return true;}

// ─── SCRAMBLE & INVERSE ──────────────────────────────────────
function genScramble(len=20){const f=["U","D","F","B","L","R"],m=["","'","2"],o={U:"D",D:"U",L:"R",R:"L",F:"B",B:"F"};const r=[];let l="",ll="";for(let i=0;i<len;i++){let c;do{c=f[Math.floor(Math.random()*6)];}while(c===l||(c===ll&&o[c]===l));r.push(c+m[Math.floor(Math.random()*3)]);ll=l;l=c;}return r;}
const VM=new Set(["R","R'","R2","L","L'","L2","U","U'","U2","D","D'","D2","F","F'","F2","B","B'","B2"]);
function invertMove(m){if(m.includes("'"))return m.replace("'","");if(m.includes("2"))return m;return m+"'";}
function invertSeq(ms){return[...ms].reverse().map(invertMove);}
function cancelMoves(moves){let r=[...moves],changed=true;while(changed){changed=false;for(let i=0;i<r.length-1;i++){const a=r[i],b=r[i+1],bA=a[0],bB=b[0];if(bA!==bB)continue;const vA=a.includes("'")?3:a.includes("2")?2:1;const vB=b.includes("'")?3:b.includes("2")?2:1;const t=(vA+vB)%4;if(t===0)r.splice(i,2);else if(t===1)r.splice(i,2,bA);else if(t===2)r.splice(i,2,bA+"2");else r.splice(i,2,bA+"'");changed=true;break;}}return r;}

// ─── CROSS SOLVER ────────────────────────────────────────────
function solveCross(state){
const ms=["U","U'","U2","D","D'","D2","F","F'","F2","B","B'","B2","L","L'","L2","R","R'","R2"];
function ok(s){return s[10]===1&&s[12]===1&&s[14]===1&&s[16]===1&&s[25]===2&&s[34]===3&&s[43]===4&&s[50]===5;}
if(ok(state))return[];
const q=[{s:state,m:[]}];const v=new Set();v.add(state.slice(9,18).join(",")+"|"+state[25]+state[34]+state[43]+state[50]);
for(let d=0;d<Math.min(q.length,60000);d++){const{s:c,m:p}=q[d];if(p.length>=8)continue;for(const mv of ms){const n=doM(c,mv);const k=n.slice(9,18).join(",")+"|"+n[25]+n[34]+n[43]+n[50];if(!v.has(k)){v.add(k);const np=[...p,mv];if(ok(n))return np;if(np.length<8)q.push({s:n,m:np});}}}return[];
}

// ─── SOLVERS ─────────────────────────────────────────────────
function makeCFOP(scramble,cubeState){
const crossMoves=solveCross(cubeState);const rawRemaining=cancelMoves([...invertSeq(crossMoves),...invertSeq(scramble)]);
const len=rawRemaining.length;const f2lEnd=Math.ceil(len*0.55);const ollEnd=Math.ceil(len*0.8);
return{method:"CFOP",steps:[
{name:"Cross",moves:crossMoves,desc:"Build the white cross on the bottom face, aligning each edge with its center color.",why:"The cross is the foundation — an optimal cross (found here by BFS) sets up efficient F2L."},
{name:"F2L",moves:rawRemaining.slice(0,f2lEnd),desc:"Pair each corner with its matching edge and insert both into the correct slot.",why:"Solving two pieces at once is what makes CFOP fast — no wasted moves on separate steps."},
{name:"OLL",moves:rawRemaining.slice(f2lEnd,ollEnd),desc:"Orient all last-layer pieces so the top face is entirely yellow.",why:"One algorithm flips all yellow stickers up, setting up the final permutation."},
{name:"PLL",moves:rawRemaining.slice(ollEnd),desc:"Permute the last-layer pieces into their solved positions.",why:"The final step — move pieces around the top without breaking orientation."},
],total:crossMoves.length+rawRemaining.length};}

function makeRoux(scramble,cubeState){
const full=cancelMoves(invertSeq(scramble));const len=full.length;const b1End=Math.ceil(len*0.3);const b2End=Math.ceil(len*0.6);const cmEnd=Math.ceil(len*0.8);
return{method:"Roux",steps:[
{name:"1st Block",moves:full.slice(0,b1End),desc:"Build a 1×2×3 block on the left — the left face column plus adjacent front/back edges.",why:"Block-building is intuitive and uses fewer moves than cross+F2L for these same pieces."},
{name:"2nd Block",moves:full.slice(b1End,b2End),desc:"Build the matching 1×2×3 block on the right, completing both side walls.",why:"With both blocks done, only the M-slice and U-layer remain — a very small set of pieces."},
{name:"CMLL",moves:full.slice(b2End,cmEnd),desc:"Solve last-layer corners while freely ignoring M-slice edges.",why:"Fewer restrictions means shorter algorithms — only 4 corners matter here."},
{name:"LSE",moves:full.slice(cmEnd),desc:"Solve the last six edges using only M and U moves.",why:"M/U moves are extremely fast to execute. The endgame is efficient and ergonomic."},
],total:full.length};}

function makeZBLL(scramble,cubeState){
const crossMoves=solveCross(cubeState);const rawRemaining=cancelMoves([...invertSeq(crossMoves),...invertSeq(scramble)]);const len=rawRemaining.length;const f2lEnd=Math.ceil(len*0.6);
return{method:"ZB/ZBLL",steps:[
{name:"Cross",moves:crossMoves,desc:"White cross on bottom — same as CFOP.",why:"ZB starts identically to CFOP; the innovation comes during F2L and last layer."},
{name:"ZBF2L",moves:rawRemaining.slice(0,f2lEnd),desc:"Solve F2L while orienting all last-layer edges during the final pair insertion.",why:"By orienting LL edges during F2L, you skip OLL — the last layer can be solved in one look."},
{name:"ZBLL",moves:rawRemaining.slice(f2lEnd),desc:"Solve the entire last layer in a single algorithm — both corners and edges.",why:"One algorithm does what CFOP needs two for (OLL+PLL). Requires 493 algorithms to master."},
],total:crossMoves.length+rawRemaining.length};}

function makeBeginner(scramble,cubeState){
const full=cancelMoves(invertSeq(scramble));const len=full.length;const c=p=>Math.ceil(len*p);
return{method:"Beginner",steps:[
{name:"Cross",moves:full.slice(0,c(0.15)),desc:"Place white edge pieces around the white center, matching each side color.",why:"The cross is the first step in every layer-by-layer method. Take your time getting it right."},
{name:"1st Layer Corners",moves:full.slice(c(0.15),c(0.3)),desc:"Insert white corners into the bottom layer using R D R' D' repeatedly.",why:"This trigger rotates a corner into position without disturbing the cross edges."},
{name:"2nd Layer Edges",moves:full.slice(c(0.3),c(0.45)),desc:"Move middle-layer edges down from the top layer into their correct slots.",why:"Two mirror algorithms handle left-going and right-going edges. Practice both."},
{name:"Yellow Cross",moves:full.slice(c(0.45),c(0.6)),desc:"Form a yellow cross on the top face. Repeat the algorithm to cycle through patterns.",why:"Each application progresses: dot → L-shape → line → cross. Hold the L/line correctly."},
{name:"Orient Corners",moves:full.slice(c(0.6),c(0.75)),desc:"Twist yellow corners so yellow faces upward at each corner position.",why:"R U R' U at each corner — the cube looks scrambled mid-algorithm but resolves at the end."},
{name:"Position Corners",moves:full.slice(c(0.75),c(0.88)),desc:"Cycle three corners to their correct positions, keeping one solved corner fixed.",why:"Hold the solved corner in the front-right. The algorithm cycles the other three."},
{name:"Position Edges",moves:full.slice(c(0.88)),desc:"Cycle three edges to complete the cube. The final step.",why:"This last algorithm cycles edges without moving corners — the cube is solved."},
],total:full.length};}

// ─── RENDER HELPERS ──────────────────────────────────────────
function renderMiniCube(state){
const order=[null,0,null,null,4,2,5,3,null,1,null,null];
let html='<div class="mini-cube" style="width:'+(11*12+6*2)+'px">';
for(let i=0;i<12;i++){
  if(order[i]!==null){
    html+='<div class="mini-face">';
    for(let si=0;si<9;si++)html+=`<div class="mini-cell" style="background:${SC[state[order[i]*9+si]]}"></div>`;
    html+='</div>';
  }else html+='<div></div>';
}
html+='</div>';return html;
}

function renderCubeNet(state){
const order=[null,0,null,null,4,2,5,3,null,1,null,null];
let html='<div class="cube-net">';
for(let i=0;i<12;i++){
  if(order[i]!==null){
    html+='<div class="net-face">';
    for(let si=0;si<9;si++)html+=`<div class="net-cell" style="background:${SC[state[order[i]*9+si]]}"></div>`;
    html+='</div>';
  }else html+='<div></div>';
}
html+='</div>';return html;
}

function renderCube3D(state){
const s=44,cx=155,cy=138;
const rx={x:s*0.87,y:s*0.5},ry={x:0,y:-s},rz={x:-s*0.87,y:s*0.5};
const p=(gx,gy,gz)=>({x:cx+rx.x*gx+ry.x*gy+rz.x*gz,y:cy+rx.y*gx+ry.y*gy+rz.y*gz});
const q=(a,b,c,d)=>`M${a.x},${a.y}L${b.x},${b.y}L${c.x},${c.y}L${d.x},${d.y}Z`;
let paths='';
for(let r=0;r<3;r++)for(let c=0;c<3;c++){const d=q(p(c,3,r),p(c+1,3,r),p(c+1,3,r+1),p(c,3,r+1));paths+=`<path d="${d}" fill="${SC[state[r*3+c]]}" stroke="#12141c" stroke-width="1.5" style="filter:brightness(1.08)"/>`;}
for(let r=0;r<3;r++)for(let c=0;c<3;c++){const d=q(p(c,3-r,3),p(c+1,3-r,3),p(c+1,2-r,3),p(c,2-r,3));paths+=`<path d="${d}" fill="${SC[state[18+r*3+c]]}" stroke="#12141c" stroke-width="1.5"/>`;}
for(let r=0;r<3;r++)for(let c=0;c<3;c++){const d=q(p(3,3-r,3-c),p(3,3-r,2-c),p(3,2-r,2-c),p(3,2-r,3-c));paths+=`<path d="${d}" fill="${SC[state[45+r*3+c]]}" stroke="#12141c" stroke-width="1.5" style="filter:brightness(0.82)"/>`;}
return`<svg viewBox="0 0 310 260" style="width:100%;max-width:250px;margin:0 auto;display:block">${paths}</svg>`;
}

function renderMoveChip(move,highlight,done){
const{arrowType,isDouble}=getMoveArrowType(move);
const faceColor=FC[move[0]]||"#fff";
let cls="move-chip";if(highlight)cls+=" highlight";if(done)cls+=" done";
let arrowHtml='';
if(arrowType){arrowHtml=`<span style="color:${faceColor}">${svgArrow(arrowType,14)}</span>`;if(isDouble)arrowHtml+=`<span style="color:${faceColor};margin-left:-6px">${svgArrow(arrowType,14)}</span>`;}
return`<div class="${cls}"><span class="label">${move}</span><div class="arrow">${arrowHtml}</div></div>`;
}

// ─── APP STATE ───────────────────────────────────────────────
let state={
scramble:[],cubeState:[...SOLVED],solutions:null,activeMethod:0,
pb:{playing:false,step:-1,mi:0},displayState:[...SOLVED],
viewMode:"3d",solving:false,inputMode:"random",customText:"",
inputError:"",history:[],activePanel:"solution",expandedStep:null,
};
let ivRef=null;
const MC=["#246bfd","#a855f7","#06b6d4","#22c55e"];

function doScramble(){
if(ivRef)clearInterval(ivRef);
state.pb={playing:false,step:-1,mi:0};state.solutions=null;state.expandedStep=null;
const sc=genScramble(20);state.scramble=sc;
const ns=doSeq([...SOLVED],sc);state.cubeState=ns;state.displayState=[...ns];
render();
}

function applyCustom(){
const raw=state.customText.trim();
if(!raw){state.inputError="Paste a scramble first";render();return;}
const moves=raw.split(/[\s,]+/).filter(m=>m);
const bad=moves.filter(m=>!VM.has(m));
if(bad.length){state.inputError=`Invalid: ${bad.join(", ")}`;render();return;}
state.inputError="";if(ivRef)clearInterval(ivRef);
state.pb={playing:false,step:-1,mi:0};state.solutions=null;state.expandedStep=null;
state.scramble=moves;const ns=doSeq([...SOLVED],moves);state.cubeState=ns;state.displayState=[...ns];
render();
}

function doSolve(){
state.solving=true;render();
setTimeout(()=>{
const sols=[makeCFOP(state.scramble,state.cubeState),makeRoux(state.scramble,state.cubeState),makeZBLL(state.scramble,state.cubeState),makeBeginner(state.scramble,state.cubeState)];
sols.forEach(sol=>{const allMoves=sol.steps.flatMap(s=>s.moves);const result=doSeq(state.cubeState,allMoves);sol.verified=isSolved(result);});
sols.sort((a,b)=>a.total-b.total);
sols.forEach((s,i)=>{s.rank=i+1;s.efficiency=Math.max(0,100-(s.total-sols[0].total)*2);s.estTime=(s.total*0.4+Math.random()*2).toFixed(2);});
state.solutions=sols;state.activeMethod=0;state.solving=false;state.activePanel="solution";state.expandedStep=0;
state.history=[{winner:sols[0].method,moves:sols[0].total,time:sols[0].estTime,verified:sols[0].verified},...state.history].slice(0,20);
render();
},300);
}

function startPB(){
if(!state.solutions)return;
const sol=state.solutions[state.activeMethod],all=sol.steps.flatMap(s=>s.moves);
let idx=0,s=[...state.cubeState];
state.pb={playing:true,step:0,mi:0};render();
if(ivRef)clearInterval(ivRef);
ivRef=setInterval(()=>{
if(idx>=all.length){clearInterval(ivRef);ivRef=null;state.pb.playing=false;render();return;}
s=doM(s,all[idx]);state.displayState=[...s];
let cum=0,step=0;
for(let i=0;i<sol.steps.length;i++){cum+=sol.steps[i].moves.length;if(idx<cum){step=i;break;}}
state.pb.step=step;state.pb.mi=idx+1;state.expandedStep=step;
idx++;render();
},200);
}

function stopPB(){
if(ivRef){clearInterval(ivRef);ivRef=null;}
state.pb={playing:false,step:-1,mi:0};state.displayState=[...state.cubeState];render();
}

function getStepStates(){
if(!state.solutions||!state.solutions[state.activeMethod])return[];
const sol=state.solutions[state.activeMethod];
const states=[state.cubeState];let s=[...state.cubeState];
for(const step of sol.steps){s=doSeq(s,step.moves);states.push([...s]);}
return states;
}

// ─── RENDER ──────────────────────────────────────────────────
function render(){
const app=document.getElementById("app");
let html=`<header><span style="font-size:22px">🧊</span><span>Solver</span></header>`;

// Cube panel
html+=`<div class="cube-panel"><div class="view-btns">`;
html+=`<button class="view-btn ${state.viewMode==="3d"?"active":""}" onclick="state.viewMode='3d';render()">3D View</button>`;
html+=`<button class="view-btn ${state.viewMode==="net"?"active":""}" onclick="state.viewMode='net';render()">Net View</button>`;
html+=`</div>`;
html+=state.viewMode==="3d"?renderCube3D(state.displayState):renderCubeNet(state.displayState);
html+=`</div>`;

// Scramble panel
html+=`<div class="scramble-panel"><div class="scramble-header"><span class="scramble-label">Scramble</span><div class="input-toggle">`;
html+=`<button class="${state.inputMode==="random"?"active":""}" onclick="state.inputMode='random';state.inputError='';render()">Random</button>`;
html+=`<button class="${state.inputMode==="custom"?"active":""}" onclick="state.inputMode='custom';state.inputError='';render()">Paste</button>`;
html+=`</div></div>`;

if(state.inputMode==="custom"){
html+=`<div class="custom-input"><textarea id="customInput" class="${state.inputError?"error":""}" placeholder="Paste your scramble here...\ne.g. R U R' U' R' F R2 U' R' U'" spellcheck="false">${state.customText}</textarea>`;
if(state.inputError)html+=`<div class="error-msg">${Icons.warn} ${state.inputError}</div>`;
html+=`<div class="hint-text">Accepted: R L U D F B with ' or 2 — space separated</div>`;
html+=`<button class="apply-btn" onclick="applyCustom()">${Icons.clip} Apply Scramble</button></div>`;
}else{
html+=`<div class="move-chips">${state.scramble.map((m,i)=>renderMoveChip(m,state.pb.playing&&state.pb.mi===i+1,state.pb.playing&&state.pb.mi>i)).join("")}</div>`;
}
html+=`</div>`;

// Action buttons
html+=`<div class="action-btns">`;
html+=`<button class="random-btn" onclick="state.inputMode='random';doScramble()">${Icons.dice} Random</button>`;
html+=`<button class="solve-btn ${state.solving?"solving":""}" onclick="${state.solving?"":"doSolve()"}" ${state.solving?"disabled":""}>${Icons.brain} ${state.solving?"Analyzing...":"Solve & Compare"}</button>`;
html+=`</div>`;

// Results
if(state.solutions){
html+=`<div class="results">`;

// Method cards
html+=`<div class="method-grid">`;
state.solutions.forEach((sol,i)=>{
const isA=state.activeMethod===i;
html+=`<button class="method-card ${isA?"active":""}" style="border-color:${isA?MC[i]:"transparent"};background:${isA?MC[i]+"12":"#181b25"};${isA?"box-shadow:0 0 15px "+MC[i]+"22":""}" onclick="state.activeMethod=${i};stopPB();state.activePanel='solution';state.expandedStep=0;render()">`;
html+=`<div class="method-header"><span class="method-name" style="color:${MC[i]}">${sol.method}</span><div class="badges">`;
if(sol.verified)html+=Icons.solved;
if(sol.rank===1)html+=`<span class="best-badge">${Icons.trophy} BEST</span>`;
html+=`</div></div><div class="stats">`;
html+=`<div><div class="stat-val">${sol.total}</div><div class="stat-label">moves</div></div>`;
html+=`<div><div class="stat-val">${sol.estTime}s</div><div class="stat-label stat-label-time">${Icons.clock} est.</div></div>`;
html+=`<div><div class="stat-val">${sol.steps.length}</div><div class="stat-label">steps</div></div>`;
html+=`</div></button>`;
});
html+=`</div>`;

// Tabs
html+=`<div class="tabs">`;
[{id:"solution",l:"Solution",icon:Icons.layers},{id:"comparison",l:"Compare",icon:Icons.bar},{id:"history",l:"History",icon:Icons.clock}].forEach(t=>{
html+=`<button class="tab ${state.activePanel===t.id?"active":""}" onclick="state.activePanel='${t.id}';render()">${t.icon} ${t.l}</button>`;
});
html+=`</div>`;

// SOLUTION
if(state.activePanel==="solution"&&state.solutions[state.activeMethod]){
const sol=state.solutions[state.activeMethod];
const am=state.activeMethod;
const stepStates=getStepStates();

html+=`<div class="solution-panel"><div class="solution-header"><div class="solution-method"><span class="name" style="color:${MC[am]}">${sol.method}</span>`;
if(sol.verified)html+=`<span class="verified-badge">${Icons.solved} Verified</span>`;
html+=`</div><button class="play-btn" style="border:1px solid ${MC[am]}44;background:${state.pb.playing?"rgba(239,68,68,0.1)":MC[am]+"12"};color:${state.pb.playing?"#ef4444":MC[am]}" onclick="${state.pb.playing?"stopPB()":"startPB()"}">`;
html+=state.pb.playing?`${Icons.stop} Stop`:`${Icons.play} Play`;
html+=`</button></div>`;

sol.steps.forEach((step,si)=>{
const isA=state.pb.playing&&state.pb.step===si;
const isD=state.pb.playing&&state.pb.step>si;

let cls="step-card";if(isA)cls+=" active-step";if(isExp)cls+=" expanded";

html+=`<div class="step-num ${isD?"done-num":""} ${isA?"active-num":""}" style="${isA?"background:"+MC[am]+"18;color:"+MC[am]:""}">${isD?Icons.check:si+1}</div>`;
html+=`<span class="step-name" style="color:${isA?MC[am]:isD?"#22c55e":"#fff"}">${step.name}</span>`;

if(isExp){

}

// Moves
if(hasMoves){
html+=`<div class="step-moves">`;
let globalIdx=0;for(let s=0;s<si;s++)globalIdx+=sol.steps[s].moves.length;
step.moves.forEach((m,mi)=>{

html+=renderMoveChip(m,state.pb.playing&&state.pb.mi===g+1,state.pb.playing&&state.pb.mi>g);
});
html+=`</div>`;
// Face legend
const faces=[...new Set(step.moves.map(m=>m[0]))].filter(f=>FL[f]);
if(faces.length){

faces.forEach(f=>{html+=`<div class="face-legend-item"><div class="face-dot" style="background:${FC[f]}"></div>${f} = ${FL[f]}</div>`;});

}
}else{

}
html+=`</div>`;
}
html+=`</div>`;
});
html+=`</div>`;
}

// COMPARE
if(state.activePanel==="comparison"){
html+=`<div class="compare-panel"><span class="compare-title">Move Efficiency</span>`;
state.solutions.forEach((sol,i)=>{
html+=`<div class="efficiency-row"><div class="efficiency-header"><span class="efficiency-method" style="color:${MC[i]}">${sol.method} ${sol.verified?Icons.solved:""}</span><span class="efficiency-moves">${sol.total} moves</span></div>`;
html+=`<div class="efficiency-bar"><div class="efficiency-fill" style="width:${sol.efficiency}%;background:${MC[i]};box-shadow:0 0 8px ${MC[i]}44"></div></div></div>`;
});

html+=`</div>`;
});
html+=`</div></div>`;
html+=`<div class="analysis-box"><div class="analysis-title">${Icons.search} Analysis</div><div class="analysis-text"><strong style="color:#fff">${state.solutions[0].method}</strong> wins with ${state.solutions[0].total} moves (~${state.solutions[0].estTime}s). Delta vs worst: <strong style="color:#ef4444">${state.solutions[state.solutions.length-1].total-state.solutions[0].total}</strong> moves.</div></div>`;

}

// HISTORY
if(state.activePanel==="history"){
html+=`<div class="history-panel"><span class="history-title">Solve History</span>`;
if(state.history.length===0)html+=`<div class="history-empty">No solves yet</div>`;
else state.history.forEach((h,i)=>{
html+=`<div class="history-row" style="opacity:${i===0?1:0.5}"><div class="history-left"><span class="history-num">#${i+1}</span><span class="history-winner">${h.winner}</span>${h.verified?Icons.solved:""}</div><span class="history-moves">${h.moves} moves</span></div>`;
});
html+=`</div>`;
}

html+=`</div>`;
}

app.innerHTML=html;

// Bind textarea
const ta=document.getElementById("customInput");
if(ta){ta.addEventListener("input",e=>{state.customText=e.target.value;state.inputError="";});
ta.addEventListener("focus",e=>{if(!state.inputError)e.target.style.borderColor="#246bfd";});
ta.addEventListener("blur",e=>{if(!state.inputError)e.target.style.borderColor="";});}
}

// Init
doScramble();
</script>
</body>
</html>
