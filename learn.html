<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Cuboid Learn — Master the Rubik's Cube from beginner to CFOP speedsolving with curated tutorials and resources.">
    <title>Cuboid — Learn</title>
    <link rel="icon" href="./cube.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bg: '#12141c',
                        module: '#181b25',
                        moduleDark: '#0c0d17',
                        btn: '#1e242c',
                        btnHover: '#2a323d',
                        primary: '#246bfd',
                        success: '#22c55e',
                        warning: '#f59e0b',
                        danger: '#ef4444',
                        textMain: '#ffffff',
                        textMuted: '#94a3b8',
                        surface: '#1e2230',
                    },
                    fontFamily: {
                        mono: ['"Roboto Mono"', 'monospace'],
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #12141c;
            color: #ffffff;
            margin: 0;
            overflow-x: hidden;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Smooth scroll */
        html { scroll-behavior: smooth; }

        /* Glow effects */
        .glow-blue { transition: box-shadow 0.25s ease, background-color 0.25s ease; }
        .glow-blue:hover { box-shadow: 0 0 20px rgba(36, 107, 253, 0.5); }
        .glow-green { transition: box-shadow 0.25s ease; }
        .glow-green:hover { box-shadow: 0 0 20px rgba(34, 197, 94, 0.4); }

        /* Step number glow */
        .step-num {
            width: 48px; height: 48px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 14px;
            font-family: 'Roboto Mono', monospace;
            font-weight: 700; font-size: 18px;
            flex-shrink: 0;
        }

        /* Algorithm badge */
        .alg-badge {
            font-family: 'Roboto Mono', monospace;
            font-size: 13px;
            letter-spacing: 0.02em;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            padding: 8px 14px;
            display: inline-block;
            color: #e2e8f0;
            user-select: all;
            transition: border-color 0.2s, background 0.2s;
        }
        .alg-badge:hover {
            border-color: rgba(36, 107, 253, 0.4);
            background: rgba(36, 107, 253, 0.06);
        }

        /* Resource card */
        .resource-card {
            background: #181b25;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            padding: 24px;
            transition: transform 0.2s ease, border-color 0.25s ease, box-shadow 0.25s ease;
        }
        .resource-card:hover {
            transform: translateY(-2px);
            border-color: rgba(36, 107, 253, 0.3);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        /* Pill nav */
        .pill-nav {
            background: rgba(24, 27, 37, 0.95);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.06);
        }

        /* Fade in on scroll */
        .fade-section {
            opacity: 0;
            transform: translateY(24px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }
        .fade-section.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Cube face mini */
        .mini-face {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 2px;
            width: 42px; height: 42px;
        }
        .mini-sticker {
            border-radius: 2px;
            width: 100%; height: 100%;
        }

        /* Timeline */
        .timeline-line {
            position: absolute;
            left: 23px;
            top: 48px;
            bottom: 0;
            width: 2px;
            background: linear-gradient(to bottom, rgba(36,107,253,0.4), rgba(36,107,253,0.05));
        }

        /* Tag */
        .tag {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 4px 10px;
            border-radius: 6px;
        }

        /* Section divider */
        .section-divider {
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.06), transparent);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        /* ─── Icons ─────────────────────────────────────────────── */
        const CubeIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 256 256"><path d="M224,177.3V78.7a8.1,8.1,0,0,0-4.1-7l-88-49.5a7.8,7.8,0,0,0-7.8,0l-88,49.5a8.1,8.1,0,0,0-4.1,7v98.6a8.1,8.1,0,0,0,4.1,7l88,49.5a7.8,7.8,0,0,0,7.8,0l88-49.5A8.1,8.1,0,0,0,224,177.3Z" fill="none" stroke="currentColor" strokeLinecap="round" strokeLinejoin="round" strokeWidth="24"></path><polyline points="222.9 74.6 128.9 128 33.1 74.6" fill="none" stroke="currentColor" strokeLinecap="round" strokeLinejoin="round" strokeWidth="24"></polyline><line x1="128.9" y1="128" x2="128" y2="234.8" fill="none" stroke="currentColor" strokeLinecap="round" strokeLinejoin="round" strokeWidth="24"></line></svg>
        );
        const ExternalLink = () => (
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        );
        const ChevronRight = () => (
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        );
        const BookIcon = () => (
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        );
        const VideoIcon = () => (
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
        );
        const TargetIcon = () => (
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
        );
        const ZapIcon = () => (
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        );
        const LayersIcon = () => (
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
        );

        /* ─── Mini Cube Face Component ──────────────────────────── */
        const MiniFace = ({ colors }) => (
            <div className="mini-face">
                {colors.map((c, i) => <div key={i} className="mini-sticker" style={{ backgroundColor: c }} />)}
            </div>
        );

        /* ─── Notation Reference Data ──────────────────────────── */
        const NOTATION = [
            { move: 'R', desc: 'Right face clockwise' },
            { move: "R'", desc: 'Right face counter-clockwise' },
            { move: 'R2', desc: 'Right face 180°' },
            { move: 'L', desc: 'Left face clockwise' },
            { move: 'U', desc: 'Upper face clockwise' },
            { move: 'D', desc: 'Down face clockwise' },
            { move: 'F', desc: 'Front face clockwise' },
            { move: 'B', desc: 'Back face clockwise' },
            { move: 'x', desc: 'Rotate cube on R axis' },
            { move: 'y', desc: 'Rotate cube on U axis' },
            { move: 'M', desc: 'Middle slice (same dir as L)' },
        ];

        /* ─── Main App ─────────────────────────────────────────── */
        function App() {
            const [activeSection, setActiveSection] = useState('beginner');
            const sectionsRef = useRef({});

            // Intersection observer for fade-in
            useEffect(() => {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('visible');
                        }
                    });
                }, { threshold: 0.08 });

                document.querySelectorAll('.fade-section').forEach(el => observer.observe(el));
                return () => observer.disconnect();
            }, []);

            // Track active section on scroll
            useEffect(() => {
                const handleScroll = () => {
                    const sections = ['beginner', 'notation', 'cfop', 'resources'];
                    let current = 'beginner';
                    for (const id of sections) {
                        const el = document.getElementById(id);
                        if (el && el.getBoundingClientRect().top <= 160) current = id;
                    }
                    setActiveSection(current);
                };
                window.addEventListener('scroll', handleScroll, { passive: true });
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const scrollTo = (id) => {
                document.getElementById(id)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
            };

            const NAV_ITEMS = [
                { id: 'beginner', label: 'Beginner' },
                { id: 'notation', label: 'Notation' },
                { id: 'cfop', label: 'CFOP' },
                { id: 'resources', label: 'Resources' },
            ];

            return (
                <div className="font-sans bg-bg min-h-screen relative">
                    {/* ─── Header ──────────────────────────────── */}
                    <header className="flex items-center justify-between p-4 max-w-6xl mx-auto">
                        <a href="./" className="flex gap-2 text-white font-bold text-lg items-center opacity-80 hover:opacity-100 transition-opacity">
                            <CubeIcon /> <span>Cuboid</span>
                        </a>
                        <a href="./" className="text-sm text-textMuted hover:text-white transition-colors flex items-center gap-1.5">
                            ← Back to Timer
                        </a>
                    </header>

                    {/* ─── Sticky pill nav ─────────────────────── */}
                    <div className="sticky top-4 z-50 flex justify-center px-4 mb-8" style={{ pointerEvents: 'none' }}>
                        <nav className="pill-nav rounded-full px-2 py-1.5 flex gap-1" style={{ pointerEvents: 'all' }}>
                            {NAV_ITEMS.map(item => (
                                <button
                                    key={item.id}
                                    onClick={() => scrollTo(item.id)}
                                    className={`px-4 py-1.5 rounded-full text-sm font-semibold transition-all duration-200 ${
                                        activeSection === item.id
                                            ? 'bg-primary text-white shadow-lg shadow-primary/20'
                                            : 'text-textMuted hover:text-white'
                                    }`}
                                >
                                    {item.label}
                                </button>
                            ))}
                        </nav>
                    </div>

                    <div className="max-w-4xl mx-auto px-4 pb-24">

                        {/* ─── Hero ────────────────────────────────── */}
                        <div className="text-center mb-20 pt-8">
                            <div className="inline-flex items-center gap-2 mb-6">
                                <span className="tag bg-primary/15 text-primary">Learn</span>
                                <span className="tag bg-success/15 text-success">3×3</span>
                            </div>
                            <h1 className="text-4xl sm:text-5xl md:text-6xl font-black tracking-tight mb-5 leading-[1.1]">
                                From First Solve<br/>to <span className="text-primary">Sub-20</span>
                            </h1>
                            <p className="text-textMuted text-lg max-w-xl mx-auto leading-relaxed">
                                A structured path from picking up your first cube to mastering the CFOP speedsolving method — with only the highest-quality resources.
                            </p>
                        </div>

                        {/* ═══════════════════════════════════════════
                             SECTION 1: BEGINNER METHOD
                            ═══════════════════════════════════════════ */}
                        <section id="beginner" className="mb-24 scroll-mt-20">
                            <div className="fade-section">
                                <div className="flex items-center gap-3 mb-2">
                                    <LayersIcon />
                                    <h2 className="text-2xl font-extrabold">Beginner Method</h2>
                                </div>
                                <p className="text-textMuted mb-10 max-w-2xl">
                                    The layer-by-layer (LBL) approach solves the cube one horizontal layer at a time. It requires only 6–8 algorithms and is the foundation every speedcuber starts from.
                                </p>
                            </div>

                            {/* Steps */}
                            <div className="space-y-6">
                                {/* Step 1 */}
                                <div className="fade-section relative">
                                    <div className="flex gap-4">
                                        <div className="step-num bg-white/[0.06] text-primary">1</div>
                                        <div className="flex-1 bg-module rounded-2xl p-5 border border-white/[0.04]">
                                            <h3 className="font-bold text-lg mb-1">White Cross</h3>
                                            <p className="text-textMuted text-sm leading-relaxed mb-3">
                                                Form a plus-sign ("cross") on the white face so that each white edge also matches the centre colour of the adjacent side. Hold white on the bottom — this habit pays off later when you transition to CFOP.
                                            </p>
                                            <div className="flex flex-wrap gap-2">
                                                <span className="tag bg-primary/10 text-primary">Intuitive — no algorithms</span>
                                                <span className="tag bg-white/5 text-textMuted">Goal: ≤ 8 moves</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* Step 2 */}
                                <div className="fade-section">
                                    <div className="flex gap-4">
                                        <div className="step-num bg-white/[0.06] text-primary">2</div>
                                        <div className="flex-1 bg-module rounded-2xl p-5 border border-white/[0.04]">
                                            <h3 className="font-bold text-lg mb-1">First Layer Corners</h3>
                                            <p className="text-textMuted text-sm leading-relaxed mb-3">
                                                Insert the four white corners into their correct positions. Find a white corner in the top layer, position it above its target slot, then use the "Right-hand algorithm" repeatedly until it drops in.
                                            </p>
                                            <div className="alg-badge">R U R' U'</div>
                                            <p className="text-xs text-textMuted mt-2">Repeat 1–5 times depending on corner orientation.</p>
                                        </div>
                                    </div>
                                </div>

                                {/* Step 3 */}
                                <div className="fade-section">
                                    <div className="flex gap-4">
                                        <div className="step-num bg-white/[0.06] text-primary">3</div>
                                        <div className="flex-1 bg-module rounded-2xl p-5 border border-white/[0.04]">
                                            <h3 className="font-bold text-lg mb-1">Second Layer Edges</h3>
                                            <p className="text-textMuted text-sm leading-relaxed mb-3">
                                                Place each middle-layer edge by pairing it with its matching centre. If the edge needs to go right, use the "insert-right" algorithm; if left, the mirror.
                                            </p>
                                            <div className="flex flex-wrap gap-2 mb-2">
                                                <div>
                                                    <span className="text-[10px] text-textMuted block mb-1">Insert Right</span>
                                                    <span className="alg-badge">U R U' R' U' F' U F</span>
                                                </div>
                                                <div>
                                                    <span className="text-[10px] text-textMuted block mb-1">Insert Left</span>
                                                    <span className="alg-badge">U' L' U L U F U' F'</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* Step 4 */}
                                <div className="fade-section">
                                    <div className="flex gap-4">
                                        <div className="step-num bg-white/[0.06] text-warning">4</div>
                                        <div className="flex-1 bg-module rounded-2xl p-5 border border-white/[0.04]">
                                            <h3 className="font-bold text-lg mb-1">Yellow Cross</h3>
                                            <p className="text-textMuted text-sm leading-relaxed mb-3">
                                                Flip the cube so yellow is on top. Apply the algorithm below to form a yellow cross. You may need to repeat it 1–3 times depending on whether you start with a dot, an L-shape, or a line.
                                            </p>
                                            <div className="alg-badge">F R U R' U' F'</div>
                                        </div>
                                    </div>
                                </div>

                                {/* Step 5 */}
                                <div className="fade-section">
                                    <div className="flex gap-4">
                                        <div className="step-num bg-white/[0.06] text-warning">5</div>
                                        <div className="flex-1 bg-module rounded-2xl p-5 border border-white/[0.04]">
                                            <h3 className="font-bold text-lg mb-1">Yellow Face (Orient Last Layer)</h3>
                                            <p className="text-textMuted text-sm leading-relaxed mb-3">
                                                Now make the entire top face yellow. Position the cube so any already-correct yellow corner is in the front-right, then apply the "Sune" algorithm. Repeat if needed.
                                            </p>
                                            <div className="alg-badge">R U R' U R U2 R'</div>
                                        </div>
                                    </div>
                                </div>

                                {/* Step 6 */}
                                <div className="fade-section">
                                    <div className="flex gap-4">
                                        <div className="step-num bg-white/[0.06] text-success">6</div>
                                        <div className="flex-1 bg-module rounded-2xl p-5 border border-white/[0.04]">
                                            <h3 className="font-bold text-lg mb-1">Position Last Layer Corners</h3>
                                            <p className="text-textMuted text-sm leading-relaxed mb-3">
                                                Cycle three corners until each sits above its matching centre colours. Hold the one correct corner (if any) at the front-right.
                                            </p>
                                            <div className="alg-badge">U R U' L' U R' U' L</div>
                                        </div>
                                    </div>
                                </div>

                                {/* Step 7 */}
                                <div className="fade-section">
                                    <div className="flex gap-4">
                                        <div className="step-num bg-white/[0.06] text-success">7</div>
                                        <div className="flex-1 bg-module rounded-2xl p-5 border border-white/[0.04]">
                                            <h3 className="font-bold text-lg mb-1">Position Last Layer Edges</h3>
                                            <p className="text-textMuted text-sm leading-relaxed mb-3">
                                                Cycle three edges to finish the cube. Find one solved edge and hold it at the back, then run the algorithm in the direction the edges need to rotate.
                                            </p>
                                            <div className="flex flex-wrap gap-2">
                                                <div>
                                                    <span className="text-[10px] text-textMuted block mb-1">Clockwise (U-perm a)</span>
                                                    <span className="alg-badge">R U' R U R U R U' R' U' R2</span>
                                                </div>
                                                <div>
                                                    <span className="text-[10px] text-textMuted block mb-1">Counter-clockwise (U-perm b)</span>
                                                    <span className="alg-badge">R2 U R U R' U' R' U' R' U R'</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="fade-section mt-8 bg-success/5 border border-success/15 rounded-2xl p-5">
                                <p className="text-success font-bold text-sm mb-1">🎉 Cube solved!</p>
                                <p className="text-textMuted text-sm">With practice, a beginner can comfortably reach times of 1–2 minutes using this method. To break under 40 seconds, it's time to learn CFOP.</p>
                            </div>
                        </section>

                        <div className="section-divider mb-24"></div>

                        {/* ═══════════════════════════════════════════
                             SECTION 2: NOTATION REFERENCE
                            ═══════════════════════════════════════════ */}
                        <section id="notation" className="mb-24 scroll-mt-20">
                            <div className="fade-section">
                                <div className="flex items-center gap-3 mb-2">
                                    <BookIcon />
                                    <h2 className="text-2xl font-extrabold">Move Notation</h2>
                                </div>
                                <p className="text-textMuted mb-8 max-w-2xl">
                                    Standard Singmaster notation. A letter alone means 90° clockwise; a prime (') means counter-clockwise; a 2 means 180°.
                                </p>
                            </div>

                            <div className="fade-section grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3">
                                {NOTATION.map(n => (
                                    <div key={n.move} className="bg-module rounded-xl p-4 border border-white/[0.04] flex items-center gap-3">
                                        <span className="font-mono font-bold text-primary text-lg w-8">{n.move}</span>
                                        <span className="text-textMuted text-xs leading-tight">{n.desc}</span>
                                    </div>
                                ))}
                            </div>

                            <div className="fade-section mt-6 bg-white/[0.02] border border-white/[0.06] rounded-xl p-4">
                                <p className="text-sm text-textMuted">
                                    <span className="text-white font-semibold">Lowercase letters</span> (r, l, u, d, f, b) denote <em>wide</em> moves — the outer layer plus the adjacent slice turn together. Whole-cube rotations use <span className="font-mono text-primary">x</span> (on R axis), <span className="font-mono text-primary">y</span> (on U axis), and <span className="font-mono text-primary">z</span> (on F axis).
                                </p>
                            </div>
                        </section>

                        <div className="section-divider mb-24"></div>

                        {/* ═══════════════════════════════════════════
                             SECTION 3: CFOP
                            ═══════════════════════════════════════════ */}
                        <section id="cfop" className="mb-24 scroll-mt-20">
                            <div className="fade-section">
                                <div className="flex items-center gap-3 mb-2">
                                    <ZapIcon />
                                    <h2 className="text-2xl font-extrabold">CFOP Method</h2>
                                </div>
                                <p className="text-textMuted mb-4 max-w-2xl">
                                    Developed independently by Jessica Fridrich and others in the early 1980s, CFOP is the dominant speedsolving method used by virtually all top competitors. It has four stages:
                                </p>
                                <div className="flex flex-wrap gap-2 mb-10">
                                    <span className="tag bg-white/[0.06] text-white">Cross</span>
                                    <ChevronRight />
                                    <span className="tag bg-primary/15 text-primary">F2L</span>
                                    <ChevronRight />
                                    <span className="tag bg-warning/15 text-warning">OLL</span>
                                    <ChevronRight />
                                    <span className="tag bg-success/15 text-success">PLL</span>
                                </div>
                            </div>

                            {/* ─── C: Cross ────────────────────────── */}
                            <div className="fade-section mb-12">
                                <div className="bg-module rounded-2xl border border-white/[0.06] overflow-hidden">
                                    <div className="p-6 border-b border-white/[0.04]">

                                            </div>
                                        </div>
                                        <p className="text-textMuted text-sm leading-relaxed">
                                            Instead of solving corners and edges separately (as in LBL), F2L pairs a corner with its matching edge and inserts them together into the correct slot. This single innovation is the biggest time-saver in CFOP.
                                        </p>
                                    </div>
                                    <div className="p-6 bg-white/[0.015]">

                                                <p className="text-sm text-textMuted"><span className="text-white font-semibold">Start intuitively.</span> Understand the three core ideas: hide the corner (U-move it away), pair it with the edge, then insert. This covers most cases without memorising algorithms.</p>
                                            </div>
                                            <div className="flex gap-3 items-start">
                                                <span className="text-primary font-mono text-sm font-bold mt-0.5">02</span>
                                                <p className="text-sm text-textMuted"><span className="text-white font-semibold">Minimise cube rotations.</span> Good F2L means solving as many pairs as possible without rotating the entire cube. Use the back slot freely — you can insert pairs there with R and U moves alone.</p>
                                            </div>
                                            <div className="flex gap-3 items-start">
                                                <span className="text-primary font-mono text-sm font-bold mt-0.5">03</span>
                                                <p className="text-sm text-textMuted"><span className="text-white font-semibold">Develop "lookahead."</span> While inserting one pair, scan the top layer for the next corner-edge pair. This continuous flow is what separates sub-15 solvers from sub-30 solvers.</p>
                                            </div>

                                            </div>
